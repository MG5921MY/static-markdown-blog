site:
  name: Mijiao Notes
  alias: 静态 Markdown 博客
  description: Markdown first, theme driven, base-path agnostic static blog.
  author: MijiaoGame
  email: your-email@example.com
  favicon: assets/favicon.svg
  logo: ""

deployment:
  basePath: auto

theme:
  active: mono


content:
  categories:
    - id: guide
      name: 快速开始
      icon: "->"
      path: content/posts/guide
      type: flat
      description: 新结构上手与部署入口。
    - id: themes
      name: 主题系统
      icon: "*"
      path: content/posts/themes
      type: flat
      description: 主题设计基线与 token 体系说明。
  pages:
    - id: about
      name: 关于
      icon: "i"
      type: markdown
      source: content/pages/about.md
  data:
    moments: content/data/moments.yml
    links: content/data/links.yml
    gallery: content/data/gallery.yml

nav:
  - name: 首页
    page: index
  - name: 关于
    page: about
  - name: 瞬间
    url: ./moments.html
  - name: 参考
    url: ./links.html
  - name: 图库
    url: ./gallery.html

features:
  moments:
    enabled: true
    source: content/data/moments.yml
  links:
    enabled: true
    source: content/data/links.yml
  gallery:
    enabled: true
    source: content/data/gallery.yml

display:
  postsPerPage: 6
  summaryLength: 140
  heroBadge: "Markdown First"
  heroSubtitle: "少配置、强主题、可部署到任意子路径。"
  showSiteInfo: true
  siteType: 静态博客
  contentDirection: Markdown / Themes / Notes
  hero:
    immersive: false
    background:
      enabled: false
      image: ""
      focalPoint: "center center"
      fit: "cover"
      dimming: 0.42
      blur: 0
