# ═══════════════════════════════════════════════════════
# Static Markdown Blog — Docker Compose
# ═══════════════════════════════════════════════════════
#
# 两种使用方式：
#
#   1. 本地构建镜像（适合开发或自定义修改）
#      docker compose up -d --build
#
#   2. 从 GitHub Container Registry 拉取预构建镜像
#      docker compose --profile pull up -d
#
# 其他常用命令：
#   docker compose down          停止并移除容器
#   docker compose logs -f       查看实时日志
#   docker compose exec blog sh 进入容器 shell
#
# ═══════════════════════════════════════════════════════

services:
  # ── 博客服务 ──────────────────────────────────────────
  blog:
    # 默认：本地构建（docker compose up -d --build）
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: static-blog:latest
    container_name: static-blog
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      # 挂载用户工作区，修改内容后重新构建即可生效
      - ../site:/app/site
    environment:
      NODE_ENV: production
      PORT: 8080
      # site/ 初始化模式：seed / empty / force
      INIT_MODE: "${INIT_MODE:-seed}"
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 32M

  # ── 远程镜像模式（docker compose --profile pull up -d）──
  blog-pull:
    profiles:
      - pull
    image: ghcr.io/mg5921my/static-markdown-blog:latest
    container_name: static-blog
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - ../site:/app/site
    environment:
      NODE_ENV: production
      PORT: 8080
      INIT_MODE: "${INIT_MODE:-seed}"
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 32M
