<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>加载中...</title>
  <meta name="description" content="" />
  <meta name="color-scheme" content="light dark" />
  <link rel="preconnect" href="./" />
  <link rel="preload" as="fetch" href="./site-config.json" crossorigin />
  <link rel="preload" as="fetch" href="./posts/index.json" crossorigin />
  <link rel="preload" as="script" href="./blog.core.js" />
  <link rel="preload" as="script" href="./blog.render.js" />
  <link rel="preload" as="script" href="./blog.ui.js" />
  <link rel="preload" as="script" href="./blog.js" />
  <link rel="preload" as="script" href="./index.page.js" />
  <link id="blog-theme" rel="stylesheet" href="./usr/themes/default/style.css" />
  <style>
    .posts-pagination {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .page-btn {
      border: 1px solid var(--border, #ccc);
      background: var(--bg-card, #fff);
      color: var(--text-secondary, #333);
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }
    .page-btn:hover:not(:disabled) {
      border-color: var(--accent, #06b6d4);
      color: var(--accent, #06b6d4);
    }
    .page-btn.active {
      background: var(--accent, #06b6d4);
      color: #fff;
      border-color: var(--accent, #06b6d4);
    }
    .page-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .page-info {
      font-size: 13px;
      color: var(--text-muted, #666);
      margin: 0 4px;
    }
  </style>
</head>

<body>
  <nav class="nav">
    <a href="./index.html" class="nav-brand">
      <div class="nav-logo"></div>
      <span id="nav-site-name">加载中...</span>
    </a>
    <div class="nav-links" id="nav-links">
      <a href="./index.html" class="nav-link active">首页</a>
    </div>
  </nav>

  <main class="main">
    <div class="container">
      <section class="hero">
        <div class="hero-badge" id="hero-badge"></div>
        <h1 class="hero-title" id="hero-title"></h1>
        <p class="hero-subtitle" id="hero-subtitle"></p>
      </section>

      <section class="section">
        <div class="section-header">
          <h2 class="section-title">最新文章</h2>
          <div class="search-box">
            <input type="text" id="search-input" class="search-input" placeholder="搜索文章..." autocomplete="off" />
            <span class="search-icon">🔍</span>
          </div>
        </div>
        <div class="filter-group" id="category-filter"></div>

        <div id="subdir-filter-container"></div>
        <div id="dir-tree-container"></div>

        <div id="posts-loading" class="loading-state">
          <div class="loading-spinner"></div>
          <p>正在加载...</p>
        </div>

        <div id="posts-grid" class="posts-grid" style="display: none;"></div>
        <div id="posts-pagination" class="posts-pagination"></div>
        <div id="posts-empty" class="empty-state" style="display: none;"><p>暂无文章</p></div>
        <div id="posts-error" class="empty-state" style="display: none;"><p id="error-message">加载失败</p></div>
      </section>

      <section class="section" id="site-info-section">
        <div class="section-header">
          <h2 class="section-title">站点信息</h2>
        </div>
        <div class="site-info" id="site-info"></div>
        <div class="contact-box" id="contact-box" style="display: none;">
          <span class="icon">📦</span>
          <span>联系邮箱：</span>
          <span class="email" id="contact-email"></span>
        </div>
      </section>
    </div>

    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <div class="footer-links" id="footer-links">
            <a href="./index.html" class="footer-link">首页</a>
          </div>
          <div class="footer-info" id="beian-footer"></div>
        </div>
      </div>
    </footer>
  </main>

  <script src="./blog.core.js"></script>
  <script src="./blog.render.js"></script>
  <script src="./blog.ui.js"></script>
  <script src="./blog.js"></script>
  <script src="./index.page.js"></script>
</body>
</html>
