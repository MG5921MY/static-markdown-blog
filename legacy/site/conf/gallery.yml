# ============================================
# 图库配置
# 
# 在 config.yml 中启用：
#   features:
#     gallery:
#       enabled: true
#       source: conf/gallery.yml
# 
# 在导航栏添加入口：
#   nav:
#     - name: 图库
#       url: ./gallery.html
# ============================================

# 全局配置
settings:
  # 默认递归深度（-1=无限，0=仅当前目录）
  maxDepth: 2
  # 支持的图片格式
  formats:
    - jpg
    - jpeg
    - png
    - gif
    - webp
    - svg
    - ico
  # 缩略图设置（前端懒加载用）
  thumbnail:
    # 是否启用懒加载
    lazyLoad: true
    # 每页显示数量
    perPage: 20

# 图库分组
groups:
  - id: photos
    name: 摄影作品
    icon: 📷
    path: assets/gallery/photos
    description: 日常摄影记录
    # 可覆盖全局递归深度
    # maxDepth: 1

  - id: wallpapers
    name: 壁纸收藏
    icon: 🖼️
    path: assets/gallery/wallpapers
    description: 精选壁纸

  - id: screenshots
    name: 截图记录
    icon: 📱
    path: assets/gallery/screenshots
    description: 项目截图、界面设计
    maxDepth: 2

