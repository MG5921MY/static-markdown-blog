<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 | 加载中...</title>
  <meta name="color-scheme" content="light dark" />
  <link rel="preconnect" href="./" />
  <link rel="preload" as="fetch" href="./site-config.json" crossorigin />
  <link rel="preload" as="fetch" href="./posts/index.json" crossorigin />
  <link id="blog-theme" rel="stylesheet" href="./usr/themes/default/style.css" />
</head>

<body>
  <nav class="nav">
    <a href="./index.html" class="nav-brand">
      <div class="nav-logo"></div>
      <span id="nav-site-name">加载中...</span>
    </a>
    <div class="nav-links" id="nav-links">
      <a href="./index.html" class="nav-link">首页</a>
    </div>
  </nav>

  <main class="main">
    <div class="error-page">
      <div class="error-code">404</div>
      <h1 class="error-title">页面未找到</h1>
      <p class="error-desc">抱歉，您访问的页面不存在或已被移动。</p>

      <div class="error-search">
        <input type="text" id="error-search-input" class="search-input" placeholder="搜索文章..." autocomplete="off" />
      </div>

      <div class="error-actions">
        <a href="./index.html" class="btn btn-primary">返回首页</a>
        <a href="./page.html?id=about" class="btn btn-secondary">关于本站</a>
      </div>

      <div id="error-recent-posts" class="error-recent" style="display:none;">
        <h3>推荐阅读</h3>
        <div id="error-posts-list" class="posts-grid"></div>
      </div>
    </div>

    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <div class="footer-links" id="footer-links">
            <a href="./index.html" class="footer-link">首页</a>
          </div>
          <div class="footer-info" id="beian-footer"></div>
        </div>
      </div>
    </footer>
  </main>

  <script src="./blog.core.js"></script>
  <script src="./blog.render.js"></script>
  <script src="./blog.ui.js"></script>
  <script src="./blog.js"></script>
  <script src="./404.page.js"></script>
</body>
</html>
