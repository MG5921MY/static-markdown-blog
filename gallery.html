<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>图库</title>
  <meta name="description" content="主题视觉资产、品牌标记和设计基线示意。" />
  <meta name="color-scheme" content="light dark" />
  <meta name="blog-base" content="auto" />
  <link rel="preconnect" href="./" />
  <link rel="preload" as="fetch" href="./site-config.json" crossorigin />
  <link id="blog-theme" rel="stylesheet" href="./themes/graphite/theme.css" />
</head>
<body>
  <nav class="nav">
    <a href="./index.html" class="nav-brand">
      <div class="nav-logo"></div>
      <span id="nav-site-name">加载中...</span>
    </a>
    <div class="nav-links" id="nav-links"></div>
  </nav>

  <main class="main">
    <section class="hero hero-compact gallery-shell">
      <div class="hero-kicker">Gallery</div>
      <h1 class="hero-title" data-i18n="gallery.title">图库</h1>
      <p class="hero-subtitle" data-i18n="gallery.description">把默认视觉语言、标识和参考板块整理成一套可浏览、可继续扩展的静态资源视图。</p>
    </section>

    <section class="section" style="padding-top: 0;">
      <div class="gallery-shell">
        <div class="gallery-shell-header">
          <div>
            <h2 class="section-title" data-i18n="gallery.visualAssets">视觉资产</h2>
            <p class="gallery-copy" data-i18n="gallery.galleryCopy">当前图集读取 `content/data/gallery.yml` 中声明的目录，并沿用统一 token 与交互样式。</p>
          </div>
        </div>

        <div id="gallery-content">
          <div class="loading-state" style="padding: 60px 0;">
            <div class="loading-spinner"></div>
            <p data-i18n="gallery.loading">正在加载图库...</p>
          </div>
        </div>
      </div>
    </section>

    <footer class="footer" data-template="footer">
      <div class="container">
        <div class="footer-content">
          <div class="footer-links" id="footer-links"></div>
          <div class="footer-info" id="beian-footer"></div>
        </div>
      </div>
    </footer>
  </main>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightbox-close-btn" type="button" aria-label="关闭" data-i18n="gallery.close">×</button>
    <button class="lightbox-nav prev" id="lightbox-prev-btn" type="button" aria-label="上一张" data-i18n="gallery.previous">‹</button>
    <div class="lightbox-content">
      <img id="lightbox-img" alt="预览图" data-i18n="gallery.preview" />
      <div class="lightbox-info">
        <div class="lightbox-filename" id="lightbox-filename"></div>
        <div class="lightbox-counter" id="lightbox-counter"></div>
      </div>
    </div>
    <button class="lightbox-nav next" id="lightbox-next-btn" type="button" aria-label="下一张" data-i18n="gallery.next">›</button>
  </div>

  <script src="./blog.i18n.js"></script>
  <script src="./blog.core.js"></script>
  <script src="./blog.render.js"></script>
  <script src="./blog.ui.js"></script>
  <script src="./blog.js"></script>
  <script src="./gallery.page.js"></script>
</body>
</html>
