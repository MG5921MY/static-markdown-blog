<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>文章 | MijiaoBy米椒</title>
  <meta name="description" content="MijiaoBy米椒（米椒小屋）：个人博客与学习笔记。" />
  <meta name="color-scheme" content="light dark" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css" media="(prefers-color-scheme: dark)" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css" media="(prefers-color-scheme: light)" />
</head>

<body>
  <nav class="nav">
    <a href="./index.html" class="nav-brand">
      <div class="nav-logo"></div>
      <span>MijiaoBy米椒</span>
    </a>
    <div class="nav-links" id="nav-links">
      <a href="./index.html" class="nav-link">首页</a>
    </div>
  </nav>

  <main class="main">
    <div class="container">
      <div id="post-loading" class="loading-state" style="padding: 100px 0;">
        <div class="loading-spinner"></div>
        <p>正在加载...</p>
      </div>

      <article id="post-content" class="post-article" style="display: none;">
        <header class="post-header">
          <a href="./index.html" class="back-link">← 返回首页</a>
          <div class="post-meta">
            <span class="post-category" id="post-category"></span>
            <span class="post-date" id="post-date"></span>
          </div>
          <h1 class="post-title" id="post-title"></h1>
          <div class="post-tags" id="post-tags"></div>
        </header>
        <div class="post-body markdown-body" id="post-body"></div>
      </article>

      <div id="post-error" class="error-state" style="display: none; padding: 100px 0; text-align: center;">
        <h2>文章未找到</h2>
        <p id="error-detail">抱歉，您访问的文章不存在</p>
        <a href="./index.html" class="btn btn-primary" style="margin-top: 20px;">返回首页</a>
      </div>
    </div>

    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <div class="footer-links" id="footer-links">
            <a href="./index.html" class="footer-link">首页</a>
          </div>
          <div class="footer-info" id="beian-footer"></div>
        </div>
      </div>
    </footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/css.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/xml.min.js"></script>
  <script src="./blog.js"></script>
  
  <script>
    (async function() {
      const loadingEl = document.getElementById('post-loading');
      const contentEl = document.getElementById('post-content');
      const errorEl = document.getElementById('post-error');
      const errorDetail = document.getElementById('error-detail');

      const postId = Blog.getUrlParam('id');
      if (!postId) {
        loadingEl.style.display = 'none';
        errorDetail.textContent = '缺少文章参数';
        errorEl.style.display = 'block';
        return;
      }

      try {
        const success = await Blog.init();
        if (!success) throw new Error('初始化失败');

        // 渲染导航栏
        Blog.renderNavLinks();

        const post = await Blog.loadPostContent(postId);
        
        document.title = `${post.title} | MijiaoBy米椒`;
        document.getElementById('post-category').textContent = `${post.categoryIcon || ''} ${post.categoryName}`;
        document.getElementById('post-date').textContent = Blog.formatDate(post.date);
        document.getElementById('post-title').textContent = post.title;
        
        document.getElementById('post-tags').innerHTML = (post.tags || []).map(tag => 
          `<span class="post-tag">${Blog.escapeHtml(tag)}</span>`
        ).join('');

        document.getElementById('post-body').innerHTML = Blog.renderMarkdown(post.content);

        loadingEl.style.display = 'none';
        contentEl.style.display = 'block';
      } catch (error) {
        console.error('Failed to load post:', error);
        loadingEl.style.display = 'none';
        errorDetail.textContent = error.message;
        errorEl.style.display = 'block';
      }
    })();
  </script>
</body>
</html>
