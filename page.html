<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>页面 | MijiaoBy米椒</title>
  <meta name="description" content="MijiaoBy米椒（米椒小屋）" />
  <meta name="color-scheme" content="light dark" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css" media="(prefers-color-scheme: dark)" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css" media="(prefers-color-scheme: light)" />
</head>

<body>
  <nav class="nav">
    <a href="./index.html" class="nav-brand">
      <div class="nav-logo"></div>
      <span>MijiaoBy米椒</span>
    </a>
    <div class="nav-links" id="nav-links"></div>
  </nav>

  <main class="main">
    <div class="container">
      <div id="page-loading" class="loading-state" style="padding: 100px 0;">
        <div class="loading-spinner"></div>
        <p>正在加载...</p>
      </div>

      <!-- Markdown 页面内容 -->
      <div id="page-markdown" style="display: none;">
        <section class="hero" style="padding-bottom: 40px;">
          <h1 class="hero-title" id="page-title"></h1>
          <p class="hero-subtitle" id="page-desc"></p>
        </section>
        <section class="section" style="padding-top: 0;">
          <div class="markdown-body" id="page-content"></div>
        </section>
      </div>

      <!-- 分类页面内容 -->
      <div id="page-category" style="display: none;">
        <section class="hero" style="padding-bottom: 40px;">
          <h1 class="hero-title" id="cat-title"></h1>
          <p class="hero-subtitle" id="cat-desc"></p>
        </section>
        <section class="section" style="padding-top: 0;">
          <div id="cat-dir-nav"></div>
          <div id="cat-dir-tree"></div>
          <div id="cat-posts" class="posts-grid"></div>
        </section>
      </div>

      <!-- HTML 页面内容 -->
      <div id="page-html" style="display: none;">
        <section class="hero" style="padding-bottom: 40px;">
          <h1 class="hero-title" id="html-title"></h1>
          <p class="hero-subtitle" id="html-desc"></p>
        </section>
        <section class="section" style="padding-top: 0;">
          <div id="html-content"></div>
        </section>
      </div>

      <!-- 错误页面 -->
      <div id="page-error" class="error-state" style="display: none; padding: 100px 0; text-align: center;">
        <h2>页面未找到</h2>
        <p id="error-detail">抱歉，您访问的页面不存在</p>
        <a href="./index.html" class="btn btn-primary" style="margin-top: 20px;">返回首页</a>
      </div>
    </div>

    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <div class="footer-links" id="footer-links"></div>
          <div class="footer-info" id="beian-footer"></div>
        </div>
      </div>
    </footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/json.min.js"></script>
  <script src="./blog.js"></script>
  
  <script>
    (async function() {
      const loadingEl = document.getElementById('page-loading');
      const errorEl = document.getElementById('page-error');
      const errorDetail = document.getElementById('error-detail');

      // 获取页面 ID
      const pageId = Blog.getUrlParam('id');
      if (!pageId) {
        loadingEl.style.display = 'none';
        errorDetail.textContent = '缺少页面参数';
        errorEl.style.display = 'block';
        return;
      }

      try {
        const success = await Blog.init();
        if (!success) throw new Error('初始化失败');

        // 渲染导航栏
        Blog.renderNavLinks();

        // 获取页面数据
        const page = Blog.config?.pages?.[pageId];
        if (!page) throw new Error('页面不存在');

        document.title = `${page.name} | MijiaoBy米椒`;
        loadingEl.style.display = 'none';

        if (page.type === 'markdown') {
          // Markdown 页面
          document.getElementById('page-title').textContent = page.title || page.name;
          document.getElementById('page-desc').textContent = page.description || '';
          document.getElementById('page-content').innerHTML = Blog.renderMarkdown(page.content || '');
          document.getElementById('page-markdown').style.display = 'block';

        } else if (page.type === 'category') {
          // 分类页面
          const category = Blog.index?.categories?.[page.categoryId];
          if (!category) throw new Error('分类不存在');

          document.getElementById('cat-title').textContent = `${page.icon || category.icon || ''} ${page.name}`;
          document.getElementById('cat-desc').textContent = page.description || category.description || '';
          
          // 当前路径
          let currentPath = '';
          
          function updateCategoryDisplay(dirPath = '') {
            currentPath = dirPath;
            const result = Blog.renderCategoryContent(page.categoryId, dirPath);
            
            document.getElementById('cat-dir-nav').innerHTML = result.dirNav || '';
            document.getElementById('cat-dir-tree').innerHTML = result.dirTreePanel || '';
            document.getElementById('cat-posts').innerHTML = result.html || '<div class="empty-state"><p>暂无文章</p></div>';
          }
          
          updateCategoryDisplay();
          document.getElementById('page-category').style.display = 'block';

          // 目录导航点击
          document.getElementById('cat-dir-nav').addEventListener('click', (e) => {
            const btn = e.target.closest('.dir-nav-btn');
            if (btn) {
              updateCategoryDisplay(btn.dataset.path);
              return;
            }
            if (e.target.closest('.dir-tree-toggle')) {
              const panel = document.querySelector('.dir-tree-panel');
              if (panel) panel.style.display = panel.style.display === 'none' ? 'flex' : 'none';
            }
          });

          // 目录树点击
          document.getElementById('cat-dir-tree').addEventListener('click', (e) => {
            if (e.target.closest('.dir-tree-close')) {
              const panel = document.querySelector('.dir-tree-panel');
              if (panel) panel.style.display = 'none';
              return;
            }
            const item = e.target.closest('.tree-item');
            if (item) {
              updateCategoryDisplay(item.dataset.path);
              document.querySelectorAll('.tree-item').forEach(i => i.classList.remove('active'));
              item.classList.add('active');
            }
          });

        } else if (page.type === 'html') {
          // HTML 页面 - 使用 DOMPurify 净化
          document.getElementById('html-title').textContent = `${page.icon || ''} ${page.name}`;
          document.getElementById('html-desc').textContent = page.description || '';
          const htmlContent = page.content || '';
          document.getElementById('html-content').innerHTML = typeof DOMPurify !== 'undefined' 
            ? DOMPurify.sanitize(htmlContent) 
            : Blog.escapeHtml(htmlContent);
          document.getElementById('page-html').style.display = 'block';
        }

      } catch (error) {
        console.error('Failed to load page:', error);
        loadingEl.style.display = 'none';
        errorDetail.textContent = error.message;
        errorEl.style.display = 'block';
      }
    })();
  </script>
</body>
</html>
