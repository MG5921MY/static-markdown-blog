services:
  blog:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: static-blog:latest
    container_name: static-blog
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - ../workspace/site:/app/workspace/site
    environment:
      NODE_ENV: production
      PORT: 8080
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 32M
