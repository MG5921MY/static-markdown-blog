# ============================================
# 静态博客 - 默认配置
# 
# 这是 Docker 容器的默认配置
# 您可以修改此文件来自定义您的博客
# ============================================

# ---------- 站点基本信息 ----------
site:
  name: 静态博客
  alias: Static Blog
  description: 一个轻量级的纯静态博客系统
  author: Blogger
  email: ""
  favicon: assets/favicon-light.ico
  logo: assets/favicon-light.ico

# ---------- 主题配置 ----------
theme:
  active: default
  config:
    primaryColor: "#6366f1"
    showFooter: true

# ---------- 备案信息 ----------
beian:
  enabled: false
  displayName: ""
  aliasName: ""
  recordName: ""
  icp:
    enabled: false
    number: ""
    url: "https://beian.miit.gov.cn/"
  police:
    enabled: false
    statusText: ""
    number: ""
    url: ""
  year: 2025

# ---------- 文章扫描配置 ----------
scan:
  maxDepth: 20
  exclude:
    - "_*"
    - "draft/*"
    - "README.md"

# ---------- 文章分类目录 ----------
categories:
  - id: guide
    name: 使用指南
    icon: 📖
    path: posts/guide
    description: 博客系统使用教程
    type: flat

  - id: features
    name: 功能介绍
    icon: ✨
    path: posts/features
    description: 系统功能特性
    type: flat

# ---------- 导航菜单 ----------
nav:
  - name: 首页
    url: ./index.html
  - name: 使用指南
    url: ./page.html?id=guide
  - name: 功能介绍
    url: ./page.html?id=features
  - name: 瞬间
    url: ./moments.html
  - name: 友链
    url: ./links.html
  - name: 关于
    url: ./page.html?id=about

# ---------- 自定义页面 ----------
pages:
  - id: about
    name: 关于本站
    icon: 👤
    type: markdown
    source: pages/about.md

  - id: guide
    name: 使用指南
    icon: 📖
    type: category
    categoryId: guide

  - id: features
    name: 功能介绍
    icon: ✨
    type: category
    categoryId: features

# ---------- 显示配置 ----------
display:
  postsPerPage: 10
  summaryLength: 150
  heroBadge: "Docker 部署成功 🎉"
  heroSubtitle: "这是默认的演示站点，您可以通过修改挂载目录中的配置文件来自定义"
  showSiteInfo: true
  siteType: "静态博客系统"
  contentDirection: "文档 / 教程 / 示例"

# ---------- 功能模块 ----------
features:
  moments:
    enabled: true
    source: conf/moments.yml
  links:
    enabled: true
    source: conf/links.yml
