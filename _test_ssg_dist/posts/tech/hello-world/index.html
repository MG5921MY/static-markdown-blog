<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hello World | Test Blog</title>
  <meta name="description" content="My first post" />
  <meta property="og:type" content="article" />
  <meta property="og:title" content="Hello World" />
  <meta property="og:description" content="My first post" />
  <meta property="og:url" content="/posts/tech/hello-world.html" />
  <meta property="og:site_name" content="Test Blog" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Hello World" />
  <meta name="twitter:description" content="My first post" />
  <meta name="color-scheme" content="light dark" />
  <meta name="blog-base" content="auto" />
  <link rel="preconnect" href="./" />
  <link rel="preload" as="fetch" href="./site-config.json" crossorigin />
  <link rel="preload" as="fetch" href="./content-index.json" crossorigin />
  <link id="blog-theme" rel="stylesheet" href="./themes/graphite/theme.css" />
</head>
<body>
  <nav class="nav">
    <a href="./index.html" class="nav-brand">
      <div class="nav-logo"></div>
      <span id="nav-site-name">加载中...</span>
    </a>
    <div class="nav-links" id="nav-links">
      <a href="./index.html" class="nav-link">首页</a>
    </div>
  </nav>

  <main class="main">
    <div class="container">
      <div id="post-loading" class="loading-state" style="padding: 100px 0;">
        <div class="loading-spinner"></div>
        <p data-i18n="post.loading">正在加载文章...</p>
      </div>

      <article id="post-content" class="post-article" style="display: none;">
        <header class="post-header">
          <a href="./index.html" class="back-link">返回首页</a>
          <div class="post-meta">
            <span class="post-category" id="post-category"></span>
            <span class="post-date" id="post-date"></span>
          </div>
          <h1 class="post-title" id="post-title"></h1>
          <div class="post-tags" id="post-tags"></div>
        </header>
        <div class="post-body markdown-body" id="post-body"></div>
        <nav class="post-nav" id="post-nav" style="display: none;">
          <a class="post-nav-link post-nav-prev" id="post-nav-prev" href="#">
            <span class="post-nav-label" data-i18n="ui.prevPost">上一篇</span>
            <span class="post-nav-title" id="post-nav-prev-title"></span>
          </a>
          <a class="post-nav-link post-nav-next" id="post-nav-next" href="#">
            <span class="post-nav-label" data-i18n="ui.nextPost">下一篇</span>
            <span class="post-nav-title" id="post-nav-next-title"></span>
          </a>
        </nav>
      </article>

      <div id="comments" class="comments-section" style="display: none;"></div>

      <div id="post-error" class="error-state" style="display: none; padding: 100px 0;">
        <h2 data-i18n="post.notFound">文章未找到</h2>
        <p id="error-detail" data-i18n="post.notFoundDetail">你访问的文章不存在，或者已经被移动。</p>
        <a href="./index.html" class="btn btn-primary" style="margin-top: 20px;" data-i18n="post.backHome">返回首页</a>
      </div>
    </div>

    <footer class="footer" data-template="footer">
      <div class="container">
        <div class="footer-content">
          <div class="footer-links" id="footer-links">
            <a href="./index.html" class="footer-link">首页</a>
          </div>
          <div class="footer-info" id="beian-footer"></div>
        </div>
      </div>
    </footer>
  </main>

  <script src="./blog.i18n.js"></script>
  <script src="./blog.core.js"></script>
  <script src="./blog.render.js"></script>
  <script src="./blog.ui.js"></script>
  <script src="./blog.js"></script>
  <script>
    (async function() {
      const loadingEl = document.getElementById('post-loading');
      const contentEl = document.getElementById('post-content');
      const errorEl = document.getElementById('post-error');
      const errorDetail = document.getElementById('error-detail');

      const postId = Blog.getUrlParam('id');
      if (!postId) {
        Blog.showPageError(loadingEl, errorEl, errorDetail, '缺少文章参数。');
        return;
      }

      await Blog.runPage({
        needIndex: true,
        needPathMap: true,
        loadingEl,
        errorEl,
        errorDetailEl: errorDetail,
        task: async () => {
          await Promise.all([Blog.loadMarkdownDeps(), Blog.loadHighlightDeps()]);
          const post = await Blog.loadPostContent(postId);

          document.title = `${post.title} | ${Blog.config?.site?.name || '博客'}`;
          document.getElementById('nav-site-name').textContent = Blog.config?.site?.name || '博客';
          document.getElementById('post-category').textContent = `${post.categoryIcon || ''} ${post.categoryName}`;
          document.getElementById('post-date').textContent = Blog.formatDate(post.date);
          document.getElementById('post-title').textContent = post.title;
          document.getElementById('post-tags').innerHTML = (post.tags || []).map((tag) =>
            `<span class="post-tag">${Blog.escapeHtml(tag)}</span>`
          ).join('');

          if (post.rendered) {
            const safe = typeof DOMPurify !== 'undefined' ? DOMPurify.sanitize(post.content) : post.content;
            document.getElementById('post-body').innerHTML = safe;
          } else {
            document.getElementById('post-body').innerHTML = Blog.renderMarkdown(post.content);
          }
          Blog.generateTOC();

          // Prev/Next navigation
          const navEl = document.getElementById('post-nav');
          if (post.prev || post.next) {
            const prevEl = document.getElementById('post-nav-prev');
            const nextEl = document.getElementById('post-nav-next');
            if (post.prev) {
              prevEl.href = Blog.resolvePageUrl('post.html', { id: post.prev.id });
              document.getElementById('post-nav-prev-title').textContent = post.prev.title;
            } else {
              prevEl.style.visibility = 'hidden';
            }
            if (post.next) {
              nextEl.href = Blog.resolvePageUrl('post.html', { id: post.next.id });
              document.getElementById('post-nav-next-title').textContent = post.next.title;
            } else {
              nextEl.style.visibility = 'hidden';
            }
            navEl.style.display = 'flex';
          }

          // Comments
          Blog.loadComments();

          loadingEl.style.display = 'none';
          contentEl.style.display = 'block';
        }
      });
    })();
  </script>
<noscript>
<article class="post-article"><header class="post-header">
<h1 class="post-title">Hello World</h1>
<div class="post-meta"><span>2024-01-01</span></div>
</header><div class="post-body markdown-body"><h1>Hello World</h1><p>Test content</p></div></article>
</noscript>

</body>
</html>
