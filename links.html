<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>友情链接</title>
  <meta name="description" content="友情链接" />
  <meta name="color-scheme" content="light dark" />
  <link rel="preconnect" href="./" />
  <link rel="preload" as="fetch" href="./site-config.json" crossorigin />
  <link id="blog-theme" rel="stylesheet" href="./usr/themes/default/style.css" />
  <style>
    .links-container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
    .links-header { text-align: center; margin-bottom: 40px; }
    .links-header h1 { font-size: 2rem; margin-bottom: 10px; }
    .links-header p { color: var(--text-secondary, #666); }

    .links-group { margin-bottom: 40px; }
    .links-group-title {
      font-size: 1.25rem;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--border, #eee);
    }

    .links-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .link-card {
      background: var(--bg-card, rgba(255,255,255,0.03));
      border: 1px solid var(--border, #eee);
      border-radius: 12px;
      padding: 20px;
      transition: all 0.3s ease;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: flex-start;
      gap: 15px;
    }
    .link-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      border-color: var(--accent, #6366f1);
    }

    .link-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent, #6366f1), var(--accent-light, #818cf8));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
    }
    .link-avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    .link-info { flex: 1; min-width: 0; }
    .link-name {
      font-weight: 600;
      font-size: 1.1rem;
      margin-bottom: 5px;
      color: var(--text-primary, #333);
    }
    .link-desc {
      font-size: 0.9rem;
      color: var(--text-secondary, #666);
      line-height: 1.5;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .link-url {
      font-size: 0.8rem;
      color: var(--text-muted, #999);
      margin-top: 8px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary, #666);
    }

    @media (max-width: 640px) {
      .links-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <nav class="nav">
    <a href="./index.html" class="nav-brand">
      <div class="nav-logo"></div>
      <span id="nav-site-name">加载中...</span>
    </a>
    <div class="nav-links" id="nav-links"></div>
  </nav>

  <main class="main">
    <div class="links-container">
      <div class="links-header">
        <h1>🔆 友情链接</h1>
        <p>一些有趣的网站和朋友们</p>
      </div>

      <div id="links-content">
        <div class="loading-state" style="padding: 60px 0;">
          <div class="loading-spinner"></div>
          <p>正在加载...</p>
        </div>
      </div>
    </div>

    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <div class="footer-links" id="footer-links"></div>
          <div class="footer-info" id="beian-footer"></div>
        </div>
      </div>
    </footer>
  </main>

  <script src="./blog.core.js"></script>
  <script src="./blog.render.js"></script>
  <script src="./blog.ui.js"></script>
  <script src="./blog.js"></script>
  <script src="./links.page.js"></script>
</body>
</html>
