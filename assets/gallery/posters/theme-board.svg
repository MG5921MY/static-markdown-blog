<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Theme baseline board</title>
  <desc id="desc">Poster showing the four built-in themes for the blog.</desc>
  <rect width="1200" height="900" fill="#f3f4f7"/>
  <text x="96" y="126" fill="#111111" font-size="64" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Built-in Themes</text>
  <text x="96" y="172" fill="#4b5563" font-size="24" font-family="Segoe UI, Arial, sans-serif">graphite / aurora / paper / mono</text>
  <g transform="translate(96 240)">
    <rect width="228" height="470" rx="28" fill="#0a0d14"/>
    <rect x="24" y="26" width="92" height="10" rx="5" fill="#6d78ff"/>
    <text x="24" y="96" fill="#f6f8fb" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700">graphite</text>
    <text x="24" y="136" fill="#b8c0ce" font-size="20" font-family="Segoe UI, Arial, sans-serif">Quiet default</text>
  </g>
  <g transform="translate(372 240)">
    <rect width="228" height="470" rx="28" fill="#ffffff" stroke="#d9e1ec"/>
    <rect x="24" y="26" width="92" height="10" rx="5" fill="#5b3df5"/>
    <text x="24" y="96" fill="#0b1f36" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700">aurora</text>
    <text x="24" y="136" fill="#60758f" font-size="20" font-family="Segoe UI, Arial, sans-serif">Brand-led</text>
  </g>
  <g transform="translate(648 240)">
    <rect width="228" height="470" rx="28" fill="#fffdf8" stroke="rgba(38,35,31,.12)"/>
    <rect x="24" y="26" width="92" height="10" rx="5" fill="#0c76db"/>
    <text x="24" y="96" fill="#26231f" font-size="34" font-family="Georgia, serif" font-weight="700">paper</text>
    <text x="24" y="136" fill="#5f5a54" font-size="20" font-family="Segoe UI, Arial, sans-serif">Reading-first</text>
  </g>
  <g transform="translate(924 240)">
    <rect width="180" height="470" rx="24" fill="#ffffff" stroke="rgba(17,17,17,.12)"/>
    <rect x="20" y="26" width="84" height="10" rx="5" fill="#111111"/>
    <text x="20" y="96" fill="#111111" font-size="30" font-family="Consolas, monospace" font-weight="700">mono</text>
    <text x="20" y="136" fill="#4c4c4c" font-size="18" font-family="Segoe UI, Arial, sans-serif">Developer minimal</text>
  </g>
</svg>
