<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>瞬间</title>
  <meta name="description" content="瞬间/说说" />
  <meta name="color-scheme" content="light dark" />
  <style>
    /* 瞬间页面专用样式 - 使用主题变量 */
    .moments-container { max-width: 700px; margin: 0 auto; padding: 40px 20px; }
    .moments-header { text-align: center; margin-bottom: 40px; }
    .moments-header h1 { font-size: 2rem; margin-bottom: 10px; }
    .moments-header p { color: var(--text-secondary, #666); }
    
    .moments-timeline { position: relative; }
    .moments-timeline::before {
      content: '';
      position: absolute;
      left: 20px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--border, #eee);
    }
    
    .moment-item {
      position: relative;
      padding-left: 50px;
      padding-bottom: 30px;
    }
    .moment-item:last-child { padding-bottom: 0; }
    
    .moment-dot {
      position: absolute;
      left: 12px;
      top: 5px;
      width: 18px;
      height: 18px;
      background: var(--bg-secondary, #fff);
      border: 3px solid var(--accent, #6366f1);
      border-radius: 50%;
      z-index: 1;
    }
    
    .moment-card {
      background: var(--bg-card, rgba(255,255,255,0.03));
      border: 1px solid var(--border, #eee);
      border-radius: 12px;
      padding: 20px;
      transition: all 0.3s ease;
    }
    .moment-card:hover {
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      border-color: var(--accent, #6366f1);
    }
    
    .moment-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      font-size: 0.9rem;
      color: var(--text-secondary, #666);
    }
    .moment-mood { font-size: 1.2rem; }
    
    .moment-content {
      font-size: 1rem;
      line-height: 1.8;
      color: var(--text-primary, #333);
      white-space: pre-wrap;
    }
    .moment-content code {
      background: var(--bg-card-hover, #f5f5f5);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
    }
    .moment-content pre {
      background: var(--bg-secondary, #f5f5f5);
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 10px 0;
    }
    .moment-content pre code {
      background: none;
      padding: 0;
    }
    
    .moment-images {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 10px;
      margin-top: 15px;
    }
    .moment-images img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .moment-images img:hover { transform: scale(1.02); }
    
    .moment-tags {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .moment-tag {
      font-size: 0.8rem;
      padding: 2px 10px;
      background: var(--bg-card-hover, #f0f0f0);
      border-radius: 20px;
      color: var(--text-secondary, #666);
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary, #666);
    }
    
    @media (max-width: 640px) {
      .moments-timeline::before { left: 15px; }
      .moment-item { padding-left: 40px; }
      .moment-dot { left: 7px; }
    }
  </style>
</head>

<body>
  <nav class="nav">
    <a href="./index.html" class="nav-brand">
      <div class="nav-logo"></div>
      <span id="nav-site-name">加载中...</span>
    </a>
    <div class="nav-links" id="nav-links"></div>
  </nav>

  <main class="main">
    <div class="moments-container">
      <div class="moments-header">
        <h1>💭 瞬间</h1>
        <p>记录生活中的点滴</p>
      </div>
      
      <div id="moments-content">
        <div class="loading-state" style="padding: 60px 0;">
          <div class="loading-spinner"></div>
          <p>正在加载...</p>
        </div>
      </div>
    </div>

    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <div class="footer-links" id="footer-links"></div>
          <div class="footer-info" id="beian-footer"></div>
        </div>
      </div>
    </footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="./blog.js"></script>
  
  <script>
    (async function() {
      try {
        await Blog.init();
        Blog.renderNavLinks();
        document.getElementById('nav-site-name').textContent = Blog.config?.site?.name || '博客';
        document.title = `瞬间 | ${Blog.config?.site?.name || '博客'}`;
        
        // 加载瞬间数据
        const momentsData = Blog.config?.features?.moments;
        if (!momentsData) {
          document.getElementById('moments-content').innerHTML = '<div class="empty-state"><p>瞬间功能未启用</p></div>';
          return;
        }
        
        const moments = momentsData.moments || [];
        
        if (moments.length === 0) {
          document.getElementById('moments-content').innerHTML = '<div class="empty-state"><p>暂无瞬间</p></div>';
          return;
        }
        
        // 按日期排序（倒序）
        moments.sort((a, b) => new Date(b.date) - new Date(a.date));
        
        const html = `<div class="moments-timeline">${moments.map(renderMoment).join('')}</div>`;
        document.getElementById('moments-content').innerHTML = html;
        
      } catch (error) {
        console.error('Failed to load moments:', error);
        document.getElementById('moments-content').innerHTML = '<div class="empty-state"><p>加载失败</p></div>';
      }
      
      function renderMoment(moment) {
        // 简单处理内容中的代码块
        let content = Blog.escapeHtml(moment.content || '');
        content = content.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
        content = content.replace(/`([^`]+)`/g, '<code>$1</code>');
        
        // 图片（验证 URL 安全性）
        let imagesHtml = '';
        if (moment.images && moment.images.length > 0) {
          const safeImages = moment.images.filter(img => {
            if (!img || typeof img !== 'string') return false;
            // 只允许相对路径或 https URL
            if (img.startsWith('http://')) return false;
            if (/^(javascript|data|vbscript):/i.test(img)) return false;
            return true;
          });
          if (safeImages.length > 0) {
            imagesHtml = `<div class="moment-images">
              ${safeImages.map(img => `<img src="${Blog.escapeHtml(img)}" alt="图片" loading="lazy">`).join('')}
            </div>`;
          }
        }
        
        // 标签
        let tagsHtml = '';
        if (moment.tags && moment.tags.length > 0) {
          tagsHtml = `<div class="moment-tags">
            ${moment.tags.map(tag => `<span class="moment-tag">#${Blog.escapeHtml(tag)}</span>`).join('')}
          </div>`;
        }
        
        return `<div class="moment-item">
          <div class="moment-dot"></div>
          <div class="moment-card">
            <div class="moment-meta">
              ${moment.mood ? `<span class="moment-mood">${Blog.escapeHtml(moment.mood)}</span>` : ''}
              <span class="moment-date">${Blog.formatDate(moment.date)}</span>
            </div>
            <div class="moment-content">${content}</div>
            ${imagesHtml}
            ${tagsHtml}
          </div>
        </div>`;
      }
    })();
  </script>
</body>
</html>
