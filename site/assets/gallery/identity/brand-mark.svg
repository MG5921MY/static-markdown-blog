<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Mijiao Notes identity board</title>
  <desc id="desc">Brand identity for the zero-dependency static blog platform.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0d14"/>
      <stop offset="100%" stop-color="#171c27"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a3aff"/>
      <stop offset="100%" stop-color="#6d78ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <circle cx="950" cy="170" r="220" fill="#1a3aff" opacity=".12"/>
  <circle cx="180" cy="760" r="260" fill="#6d78ff" opacity=".06"/>
  <rect x="96" y="90" width="1008" height="720" rx="42" fill="#10141d" stroke="rgba(255,255,255,.1)"/>
  <rect x="152" y="154" width="200" height="12" rx="6" fill="url(#accent)"/>
  <text x="152" y="260" fill="#f6f8fb" font-size="72" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Mijiao Notes</text>
  <text x="152" y="316" fill="#b8c0ce" font-size="26" font-family="Segoe UI, Arial, sans-serif">Zero-dependency static blog platform</text>
  <text x="152" y="370" fill="#6d78ff" font-size="20" font-family="Consolas, monospace">node build.js → dist/</text>
  <rect x="152" y="430" width="340" height="180" rx="24" fill="#171c27" stroke="rgba(255,255,255,.06)"/>
  <text x="188" y="478" fill="#6d78ff" font-size="18" font-family="Consolas, monospace">architecture</text>
  <text x="188" y="520" fill="#f6f8fb" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="600">kernel + plugins</text>
  <text x="188" y="556" fill="#b8c0ce" font-size="18" font-family="Segoe UI, Arial, sans-serif">src/ → res/ → dist/</text>
  <text x="188" y="586" fill="#6d78ff" font-size="16" font-family="Consolas, monospace">221 tests passing</text>
  <rect x="528" y="430" width="528" height="180" rx="24" fill="#171c27" stroke="rgba(255,255,255,.06)"/>
  <text x="564" y="478" fill="#6d78ff" font-size="18" font-family="Consolas, monospace">themes</text>
  <text x="564" y="520" fill="#f6f8fb" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="600">5 built-in themes</text>
  <text x="564" y="556" fill="#b8c0ce" font-size="18" font-family="Segoe UI, Arial, sans-serif">graphite / aurora / paper / mono / terminal</text>
  <text x="564" y="586" fill="#6d78ff" font-size="16" font-family="Consolas, monospace">45+ CSS tokens · dark mode · layout control</text>
  <rect x="152" y="640" width="904" height="120" rx="24" fill="#171c27" stroke="rgba(255,255,255,.06)"/>
  <text x="188" y="688" fill="#6d78ff" font-size="18" font-family="Consolas, monospace">features</text>
  <text x="188" y="726" fill="#b8c0ce" font-size="18" font-family="Segoe UI, Arial, sans-serif">Markdown · RSS · Sitemap · i18n · SSG · Search · KaTeX · Mermaid · Custom Pages · Docker</text>
</svg>
