<style>
/* ── Mesh Gradient Background ───────────────────────── */
.skills-section {
  --c1: #667eea; --c2: #764ba2; --c3: #f093fb; --c4: #4facfe;
  background:
    radial-gradient(ellipse at 20% 50%, var(--c1) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, var(--c2) 0%, transparent 50%),
    radial-gradient(ellipse at 40% 80%, var(--c3) 0%, transparent 50%),
    radial-gradient(ellipse at 90% 90%, var(--c4) 0%, transparent 50%),
    #0a0a1a;
  animation: mesh-drift 20s ease-in-out infinite alternate;
  padding: 80px 20px;
  min-height: 100%;
}
@keyframes mesh-drift {
  0%   { background-position: 0% 0%, 100% 0%, 50% 100%, 90% 90%; }
  50%  { background-position: 30% 20%, 70% 50%, 20% 60%, 60% 30%; }
  100% { background-position: 60% 40%, 40% 80%, 80% 20%, 30% 70%; }
}

/* ── Noise Overlay ──────────────────────────────────── */
.skills-section::after {
  content: "";
  position: absolute;
  inset: 0;
  opacity: 0.03;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 256px;
}

/* ── Glass Cards ────────────────────────────────────── */
.skills-container { max-width: 900px; margin: 0 auto; position: relative; z-index: 1; }
.skills-hero { text-align: center; margin-bottom: 48px; }
.skills-hero h2 { font-size: 36px; font-weight: 700; color: #fff; margin-bottom: 8px; }
.skills-hero p { color: rgba(255,255,255,0.6); font-size: 15px; }

.stats-row {
  display: flex;
  justify-content: center;
  gap: 32px;
  margin-bottom: 48px;
}
.stat-item { text-align: center; }
.stat-number {
  font-size: 42px;
  font-weight: 700;
  color: #fff;
  font-variant-numeric: tabular-nums;
}
.stat-label { font-size: 12px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }

.glass-card {
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(16px) saturate(180%);
  -webkit-backdrop-filter: blur(16px) saturate(180%);
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 16px;
  padding: 28px;
  margin-bottom: 20px;
}
.glass-card-title {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: rgba(255,255,255,0.4);
  margin-bottom: 20px;
}

/* ── Skill Bars ─────────────────────────────────────── */
.skill-row { display: flex; align-items: center; gap: 16px; margin-bottom: 14px; }
.skill-name { width: 120px; font-size: 14px; color: rgba(255,255,255,0.7); flex-shrink: 0; }
.skill-track { flex: 1; height: 8px; background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden; }
.skill-fill {
  height: 100%;
  border-radius: 4px;
  width: 0;
  transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1);
}
.skill-fill.animated { /* set via JS */ }
.skill-val { width: 36px; font-size: 14px; color: rgba(255,255,255,0.9); text-align: right; font-weight: 600; font-variant-numeric: tabular-nums; }

.fill-1 { background: linear-gradient(90deg, #667eea, #8b9cf7); }
.fill-2 { background: linear-gradient(90deg, #f093fb, #f5a8e8); }
.fill-3 { background: linear-gradient(90deg, #4facfe, #7ec8fe); }
.fill-4 { background: linear-gradient(90deg, #43e97b, #72f0a0); }

/* ── Scroll Reveal ──────────────────────────────────── */
.reveal {
  opacity: 0;
  transform: translateY(40px);
  transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}
.reveal.visible { opacity: 1; transform: translateY(0); }
.reveal-delay-1 { transition-delay: 0.1s; }
.reveal-delay-2 { transition-delay: 0.2s; }
.reveal-delay-3 { transition-delay: 0.3s; }
</style>

<div class="skills-section">
  <div class="skills-container">
    <div class="skills-hero reveal">
      <h2>技能矩阵</h2>
      <p>Skills Matrix — 网格渐变背景 + 毛玻璃卡片 + 滚动动画 + 数字计数器</p>
    </div>

    <div class="stats-row">
      <div class="stat-item reveal reveal-delay-1">
        <div class="stat-number"><span class="counter" data-target="5">0</span></div>
        <div class="stat-label">内置主题</div>
      </div>
      <div class="stat-item reveal reveal-delay-2">
        <div class="stat-number"><span class="counter" data-target="45">0</span>+</div>
        <div class="stat-label">CSS Token</div>
      </div>
      <div class="stat-item reveal reveal-delay-3">
        <div class="stat-number"><span class="counter" data-target="212">0</span></div>
        <div class="stat-label">自动化测试</div>
      </div>
    </div>

    <div class="glass-card reveal">
      <div class="glass-card-title">前端开发</div>
      <div class="skill-row"><span class="skill-name">JavaScript</span><div class="skill-track"><div class="skill-fill fill-1" data-width="90%"></div></div><span class="skill-val">90</span></div>
      <div class="skill-row"><span class="skill-name">CSS</span><div class="skill-track"><div class="skill-fill fill-1" data-width="95%"></div></div><span class="skill-val">95</span></div>
      <div class="skill-row"><span class="skill-name">HTML</span><div class="skill-track"><div class="skill-fill fill-1" data-width="95%"></div></div><span class="skill-val">95</span></div>
      <div class="skill-row"><span class="skill-name">TypeScript</span><div class="skill-track"><div class="skill-fill fill-1" data-width="70%"></div></div><span class="skill-val">70</span></div>
    </div>

    <div class="glass-card reveal">
      <div class="glass-card-title">设计系统</div>
      <div class="skill-row"><span class="skill-name">Token 设计</span><div class="skill-track"><div class="skill-fill fill-2" data-width="90%"></div></div><span class="skill-val">90</span></div>
      <div class="skill-row"><span class="skill-name">排版</span><div class="skill-track"><div class="skill-fill fill-2" data-width="80%"></div></div><span class="skill-val">80</span></div>
      <div class="skill-row"><span class="skill-name">响应式</span><div class="skill-track"><div class="skill-fill fill-2" data-width="85%"></div></div><span class="skill-val">85</span></div>
    </div>

    <div class="glass-card reveal">
      <div class="glass-card-title">工程能力</div>
      <div class="skill-row"><span class="skill-name">Node.js</span><div class="skill-track"><div class="skill-fill fill-3" data-width="80%"></div></div><span class="skill-val">80</span></div>
      <div class="skill-row"><span class="skill-name">Docker</span><div class="skill-track"><div class="skill-fill fill-3" data-width="70%"></div></div><span class="skill-val">70</span></div>
      <div class="skill-row"><span class="skill-name">CI/CD</span><div class="skill-track"><div class="skill-fill fill-3" data-width="65%"></div></div><span class="skill-val">65</span></div>
    </div>
  </div>
</div>

<script>
(function() {
  // Scroll reveal
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        // Animate skill bars inside this card
        entry.target.querySelectorAll('.skill-fill').forEach(function(bar) {
          bar.style.width = bar.dataset.width;
        });
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.15 });

  document.querySelectorAll('.reveal').forEach(function(el) { observer.observe(el); });

  // Number counter animation
  function animateCounter(el) {
    var target = parseInt(el.dataset.target);
    var duration = 1500;
    var start = performance.now();
    function update(now) {
      var progress = Math.min((now - start) / duration, 1);
      var eased = 1 - Math.pow(1 - progress, 4);
      el.textContent = Math.floor(target * eased);
      if (progress < 1) requestAnimationFrame(update);
    }
    requestAnimationFrame(update);
  }

  var counterObserver = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        animateCounter(entry.target);
        counterObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.5 });

  document.querySelectorAll('.counter').forEach(function(el) { counterObserver.observe(el); });
})();
</script>
